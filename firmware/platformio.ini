; PlatformIO Project Configuration File

[platformio]
default_envs = gen2_nanoatmega328new

[env]
framework = arduino
upload_speed = 115200
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    cameronbrooks11/CRUMBS @ ^0.11.0
    cameronbrooks11/bread-crumbs-contracts @ ^0.2.0
    br3ttb/PID @ ^1.2.1
    https://github.com/adafruit/MAX6675-library.git
build_flags =
    -DCRUMBS_MAX_HANDLERS=12
    ; override for flashed board address:
    ; -DI2C_ADR=10

[env:gen1_nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=1

[env:gen2_nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=2

[env:gen1_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=1

[env:gen2_nanoevery]
platform = atmelmegaavr
board = nano_every
build_flags =
    ${env.build_flags}
    -DRLHT_HW_GEN=2
